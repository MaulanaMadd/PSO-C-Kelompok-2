version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optina_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    # Mount code for hot checking (optional for prod-like, but useful)
    # volumes:
    #   - ./backend:/app
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: optina_frontend
    ports:
      - "3000:80" # Map host 3000 to container 80 (nginx)
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
