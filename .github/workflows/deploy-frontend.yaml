name: Build & Deploy to Cloud Run -- Frontend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev

      - name: Set Environment
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            echo "SERVICE_NAME=optina-frontend-staging" >> $GITHUB_ENV
            echo "API_URL=${{ secrets.VITE_API_BASE_URL_STAGING }}" >> $GITHUB_ENV
          else
            echo "SERVICE_NAME=optina-frontend" >> $GITHUB_ENV
            echo "API_URL=${{ secrets.VITE_API_BASE_URL_PROD }}" >> $GITHUB_ENV
          fi

      - name: Build & Push image
        run: |
          IMAGE="asia-southeast2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/frontend"

          docker build \
            --build-arg VITE_API_BASE_URL="$API_URL" \
            -f frontend/Dockerfile ./frontend \
            -t $IMAGE:$GITHUB_SHA

          docker push $IMAGE:$GITHUB_SHA

      - name: Deploy to Cloud Run
        run: |
          IMAGE="asia-southeast2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/frontend"

          gcloud run deploy $SERVICE_NAME \
            --image=$IMAGE:$GITHUB_SHA \
            --platform=managed \
            --region=${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi